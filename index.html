  <style>
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background-color: #FAFAF7;

    @keyframes wiggle {

      50% { transform: rotate(-4deg); }
    }
    @keyframes slideInBottom {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes marquee {

      100% { transform: translateX(-50%); }
    }
    .animate-marquee {

    }

    /* ─── Micro-interactions globales ─────────────────────────────── */
    @keyframes shimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(200%); }
    }
    @keyframes float-soft {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    @keyframes glow-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(0, 122, 255, 0.4); }
      50% { box-shadow: 0 0 0 8px rgba(0, 122, 255, 0); }
    }
    @keyframes border-flow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    @keyframes blob-morph {
      0%, 100% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
      50% { border-radius: 30% 60% 70% 40% / 50% 60% 30% 60%; }
    }
    @keyframes gradient-shift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    /* Smooth interaction defaults — adds "life" without being noisy */
    a, button, [role="button"] {
      transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1),
                  box-shadow 0.25s cubic-bezier(0.16, 1, 0.3, 1),
                  background-color 0.2s ease,
                  color 0.2s ease,
                  border-color 0.2s ease;
    }
    button:active, a:active { transform: scale(0.97); }

    /* Shimmer effect for highlighted CTAs */
    .shimmer-on-hover { position: relative; overflow: hidden; }
    .shimmer-on-hover::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(110deg, transparent 30%, rgba(255,255,255,0.25) 50%, transparent 70%);
      transform: translateX(-100%);
      transition: transform 0.8s ease;
    }
    .shimmer-on-hover:hover::after { transform: translateX(100%); }

    /* Soft float for decorative elements */
    .float-soft { animation: float-soft 5s ease-in-out infinite; }

    /* Smooth scroll-triggered fade for any [data-fade] outside FadeIn */
    @keyframes fadeUp {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* Audio bars (speaking indicator) */
    @keyframes audioBar {
      0% { height: 4px; opacity: 0.5; }
      100% { height: 14px; opacity: 1; }
    }

    /* Magnetic-feel hover for primary buttons */
    .magnetic-hover {
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .magnetic-hover:hover {
      transform: translateY(-2px) scale(1.02);
    }

    /* Subtle parallax-like float for hero phone */
    @keyframes hero-float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      33% { transform: translateY(-4px) rotate(0.3deg); }
      66% { transform: translateY(2px) rotate(-0.2deg); }
    }
    .hero-float {
      animation: hero-float 8s ease-in-out infinite;
    }

    /* Number counter pulse on scroll into view */
    @keyframes count-pulse {
      0% { transform: scale(0.95); opacity: 0; }
      60% { transform: scale(1.05); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }

    /* Gradient text shift */
    @keyframes text-shimmer {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
    .text-shimmer-blue {
      background: linear-gradient(90deg, #007AFF 0%, #00C2FF 50%, #007AFF 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: text-shimmer 3s linear infinite;
    }

    /* Reveal-from-bottom for cards */
    @keyframes card-reveal {
      0% { opacity: 0; transform: translateY(24px) scale(0.98); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Underline draw on hover for links */
    .link-draw {
      position: relative;
    }
    .link-draw::after {
      content: '';
      position: absolute;
      left: 0; right: 0; bottom: -2px;
      height: 2px;
      background: currentColor;
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .link-draw:hover::after { transform: scaleX(1); }

    /* Hover lift for bento cards */
    .bento-hover {
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .bento-hover:hover {
      transform: translateY(-4px);
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    .glass {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
    }

    .ios-shadow {
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.04);
    }

    .btn-ios-blue {
      background-color: #007AFF;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .btn-ios-blue:hover {
      transform: scale(1.02);
      box-shadow: 0 12px 24px rgba(0, 122, 255, 0.3);
    }

    .btn-ios-orange {
      background-color: #FF9500;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .btn-ios-orange:hover {
      transform: scale(1.02);
      box-shadow: 0 12px 24px rgba(255, 149, 0, 0.3);
    }

    .ios-card {
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .ios-card:hover {
      transform: translateY(-10px);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.08);
    }

    /* Anchor scroll offset to clear fixed navbar */
    section[id] {
      scroll-margin-top: 100px;
    }

    /* ─── Mobile optimizations ─────────────────────────────────────── */
    @media (max-width: 640px) {
      /* Headlines: more readable scale on small screens */
      h2.font-display {
        font-size: 2.5rem !important;       /* 40px (was 48px) */
        line-height: 1 !important;
        letter-spacing: -0.035em !important;
      }
      h3.font-display {
        font-size: 1.5rem !important;       /* 24px */
        line-height: 1.1 !important;
      }

      /* Tighter section padding so content gets to the point faster */
      section[class*="py-24"],
      section[class*="py-36"],
      div[class*="py-24"],
      div[class*="py-36"] {
        padding-top: 4rem !important;
        padding-bottom: 4rem !important;
      }

      /* Touch-friendly CTA targets — 44px minimum (Apple HIG) */
      button, a[role="button"] {
        min-height: 44px;
      }

      /* Body text breathing */
      p {
        line-height: 1.6;
      }
    }

    /* Reduce hero phone shadow weight on mobile (perf) */
    @media (max-width: 640px) and (prefers-reduced-motion: no-preference) {
      .perspective-500 { perspective: none; }
    }
  </style>
